<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 660" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="greenG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D6B4F"/><stop offset="1" stop-color="#2c5440"/>
    </linearGradient>
    <linearGradient id="ph1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9ec9ad"/><stop offset="1" stop-color="#3D6B4F"/></linearGradient>
    <linearGradient id="ph2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a9d0e6"/><stop offset="1" stop-color="#4a8bb0"/></linearGradient>
    <linearGradient id="ph3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f3d9a0"/><stop offset="1" stop-color="#d9a441"/></linearGradient>
    <linearGradient id="ph4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7b5a8"/><stop offset="1" stop-color="#d9685a"/></linearGradient>
  </defs>

  <!-- ecran -->
  <rect width="320" height="660" rx="30" fill="#FAF6EE"/>

  <!-- status bar -->
  <text x="22" y="29" font-size="12" font-weight="700" fill="#1A1A1A">9:41</text>
  <g fill="#1A1A1A">
    <circle cx="268" cy="24" r="1.7"/><circle cx="274" cy="24" r="1.7"/><circle cx="280" cy="24" r="1.7"/>
    <rect x="286" y="19" width="13" height="9" rx="2.5" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <rect x="288" y="21" width="8" height="5" rx="1" fill="#1A1A1A"/>
  </g>

  <!-- header -->
  <text x="22" y="66" font-size="21" font-weight="800" fill="#1A1A1A" letter-spacing="-0.6">my batch</text>
  <circle cx="107" cy="60" r="3.4" fill="#E8843D"/>
  <circle cx="296" cy="58" r="15" fill="#fff" stroke="#EDE7DB" stroke-width="1.2"/>
  <text x="296" y="63" font-size="14" font-weight="700" fill="#3D6B4F" text-anchor="middle">E</text>

  <!-- carte salutation -->
  <rect x="18" y="84" width="284" height="92" rx="18" fill="url(#greenG)"/>
  <circle cx="278" cy="108" r="34" fill="#E8843D" opacity="0.18"/>
  <circle cx="298" cy="150" r="18" fill="#E8843D" opacity="0.13"/>
  <text x="34" y="120" font-size="18" font-weight="800" fill="#ffffff">Bonjour Estelle</text>
  <text x="160" y="120" font-size="16">👋</text>
  <text x="34" y="140" font-size="11.5" fill="#cfe0d6">jeudi 19 juin</text>
  <rect x="34" y="150" width="150" height="16" rx="8" fill="#ffffff" opacity="0.15"/>
  <text x="42" y="161.5" font-size="10.5" font-weight="600" fill="#eaf3ee">5 plats · 3 clientes cette semaine</text>

  <!-- section recettes -->
  <text x="22" y="206" font-size="13" font-weight="800" fill="#1A1A1A">Vos recettes</text>
  <text x="300" y="206" font-size="11" font-weight="700" fill="#E8843D" text-anchor="end">Voir tout</text>

  <!-- CARTES RECETTES (2 x 2) -->
  <!-- helper layout : col gauche x=18, col droite x=166, larg=136 -->

  <!-- carte 1 : Vege -->
  <g>
    <rect x="18" y="218" width="136" height="150" rx="16" fill="#ffffff"/>
    <path d="M18 234a16 16 0 0 1 16-16h104a16 16 0 0 1 16 16v54H18z" fill="url(#ph1)"/>
    <text x="86" y="268" font-size="30" text-anchor="middle">🥦</text>
    <rect x="28" y="298" width="46" height="17" rx="8.5" fill="#e6f0ea"/>
    <text x="51" y="310" font-size="9.5" font-weight="700" fill="#3D6B4F" text-anchor="middle">Végé</text>
    <text x="28" y="334" font-size="12" font-weight="700" fill="#1A1A1A">Curry de</text>
    <text x="28" y="350" font-size="12" font-weight="700" fill="#1A1A1A">légumes coco</text>
  </g>

  <!-- carte 2 : Poisson -->
  <g>
    <rect x="166" y="218" width="136" height="150" rx="16" fill="#ffffff"/>
    <path d="M166 234a16 16 0 0 1 16-16h104a16 16 0 0 1 16 16v54H166z" fill="url(#ph2)"/>
