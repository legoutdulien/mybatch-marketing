    <text x="176" y="334" font-size="12" font-weight="700" fill="#1A1A1A">Saumon miel</text>
    <text x="176" y="350" font-size="12" font-weight="700" fill="#1A1A1A">&amp; moutarde</text>
  </g>

  <!-- carte 3 : Poulet -->
  <g>
    <rect x="18" y="380" width="136" height="150" rx="16" fill="#ffffff"/>
    <path d="M18 396a16 16 0 0 1 16-16h104a16 16 0 0 1 16 16v54H18z" fill="url(#ph3)"/>
    <text x="86" y="430" font-size="30" text-anchor="middle">🍗</text>
    <rect x="28" y="460" width="52" height="17" rx="8.5" fill="#f6ead2"/>
    <text x="54" y="472" font-size="9.5" font-weight="700" fill="#b07d1e" text-anchor="middle">Poulet</text>
    <text x="28" y="496" font-size="12" font-weight="700" fill="#1A1A1A">Poulet rôti</text>
    <text x="28" y="512" font-size="12" font-weight="700" fill="#1A1A1A">citron-thym</text>
  </g>

  <!-- carte 4 : Pates -->
  <g>
    <rect x="166" y="380" width="136" height="150" rx="16" fill="#ffffff"/>
    <path d="M166 396a16 16 0 0 1 16-16h104a16 16 0 0 1 16 16v54H166z" fill="url(#ph4)"/>
    <text x="234" y="430" font-size="30" text-anchor="middle">🍝</text>
    <rect x="176" y="460" width="48" height="17" rx="8.5" fill="#f7e0db"/>
    <text x="200" y="472" font-size="9.5" font-weight="700" fill="#c0584a" text-anchor="middle">Pâtes</text>
    <text x="176" y="496" font-size="12" font-weight="700" fill="#1A1A1A">Pâtes pesto</text>
    <text x="176" y="512" font-size="12" font-weight="700" fill="#1A1A1A">de roquette</text>
  </g>

  <!-- bandeau prochaine livraison -->
  <rect x="18" y="544" width="284" height="34" rx="12" fill="#fff5ec"/>
  <circle cx="38" cy="561" r="9" fill="#E8843D"/>
  <text x="38" y="565" font-size="10" text-anchor="middle">📅</text>
  <text x="56" y="558" font-size="10.5" font-weight="700" fill="#1A1A1A">Prochaine intervention</text>
  <text x="56" y="571" font-size="10" fill="#8a6a4a">Murielle · jeudi 13h30 — 2 portions</text>

  <!-- barre de navigation -->
  <rect x="0" y="600" width="320" height="60" fill="#ffffff"/>
  <rect x="0" y="600" width="320" height="1.2" fill="#EDE7DB"/>
  <!-- Planning (actif) -->
  <rect x="20" y="612" width="18" height="18" rx="4" fill="none" stroke="#E8843D" stroke-width="2"/>
  <line x1="20" y1="619" x2="38" y2="619" stroke="#E8843D" stroke-width="2"/>
  <text x="29" y="648" font-size="8.5" font-weight="700" fill="#E8843D" text-anchor="middle">Planning</text>
  <!-- Recettes -->
  <circle cx="93" cy="621" r="9" fill="none" stroke="#b9b2a6" stroke-width="2"/>
  <text x="93" y="648" font-size="8.5" font-weight="600" fill="#9b9488" text-anchor="middle">Recettes</text>
  <!-- Courses -->
  <path d="M150 614h14l-2 11h-10z" fill="none" stroke="#b9b2a6" stroke-width="2" stroke-linejoin="round"/>
  <text x="157" y="648" font-size="8.5" font-weight="600" fill="#9b9488" text-anchor="middle">Courses</text>
  <!-- Clientes -->
  <circle cx="221" cy="617" r="5" fill="none" stroke="#b9b2a6" stroke-width="2"/>
  <path d="M213 630a8 7 0 0 1 16 0z" fill="none" stroke="#b9b2a6" stroke-width="2"/>
  <text x="221" y="648" font-size="8.5" font-weight="600" fill="#9b9488" text-anchor="middle">Clientes</text>
  <!-- Plus -->
  <line x1="291" y1="613" x2="291" y2="629" stroke="#b9b2a6" stroke-width="2"/>
  <line x1="283" y1="621" x2="299" y2="621" stroke="#b9b2a6" stroke-width="2"/>
  <text x="291" y="648" font-size="8.5" font-weight="600" fill="#9b9488" text-anchor="middle">Plus</text>
