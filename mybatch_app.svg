<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 600" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a3a3c"/><stop offset="0.5" stop-color="#1c1c1e"/><stop offset="1" stop-color="#0c0c0d"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/><stop offset="1" stop-color="#F5EFE3"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fffaf3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#E8843D" stop-opacity="0.16"/><stop offset="1" stop-color="#E8843D" stop-opacity="0"/>
    </radialGradient>
    <filter id="phoneShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1b2b22" flood-opacity="0.30"/>
    </filter>
    <filter id="cardShadow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="8" stdDeviation="13" flood-color="#1a2620" flood-opacity="0.20"/>
    </filter>
    <clipPath id="screenClip"><rect x="104" y="28" width="212" height="524" rx="32"/></clipPath>
  </defs>

  <ellipse cx="210" cy="270" rx="200" ry="240" fill="url(#glow)"/>

  <!-- chassis + ecran -->
  <rect x="96" y="20" width="228" height="540" rx="44" fill="url(#frame)" filter="url(#phoneShadow)"/>
  <rect x="100" y="24" width="220" height="532" rx="40" fill="none" stroke="#000" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="104" y="28" width="212" height="524" rx="32" fill="url(#cream)"/>

  <g clip-path="url(#screenClip)">
    <!-- status bar -->
    <text x="118" y="50" font-size="11" font-weight="700" fill="#1A1A1A">9:41</text>
    <g fill="#1A1A1A">
      <circle cx="280" cy="46" r="1.6"/><circle cx="286" cy="46" r="1.6"/><circle cx="292" cy="46" r="1.6"/>
      <rect x="297" y="42" width="12" height="8" rx="2.2" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
      <rect x="299" y="44" width="7" height="4" rx="1" fill="#1A1A1A"/>
    </g>

    <!-- topbar app -->
    <rect x="104" y="58" width="212" height="34" fill="url(#topbar)"/>
    <text x="118" y="74" font-size="15" font-weight="800" fill="#1A1A1A" letter-spacing="-0.5">my batch</text>
    <circle cx="184" cy="68" r="2.8" fill="#E8843D"/>
    <text x="118" y="85" font-size="7.5" font-weight="600" fill="#9b9488" letter-spacing="0.4">ADMINISTRATION</text>
    <circle cx="301" cy="73" r="12" fill="#e9f1ec"/>
    <text x="301" y="77.5" font-size="11" font-weight="800" fill="#3D6B4F" text-anchor="middle">E</text>
    <rect x="104" y="91" width="212" height="1" fill="#ECE5D8"/>

    <!-- onglets -->
    <rect x="118" y="100" width="66" height="19" rx="9.5" fill="#E8843D"/>
    <text x="151" y="113" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">📅 Planning</text>
    <rect x="190" y="100" width="34" height="19" rx="9.5" fill="#f1ece1"/>
    <text x="207" y="113" font-size="8" font-weight="600" fill="#7d766a" text-anchor="middle">🍽️</text>
    <rect x="230" y="100" width="34" height="19" rx="9.5" fill="#f1ece1"/>
    <text x="247" y="113" font-size="8" font-weight="600" fill="#7d766a" text-anchor="middle">👥</text>
    <rect x="270" y="100" width="32" height="19" rx="9.5" fill="#f1ece1"/>
    <text x="286" y="113" font-size="8" font-weight="600" fill="#7d766a" text-anchor="middle">🛒</text>

    <!-- titre semaine -->
    <text x="118" y="138" font-size="11" font-weight="800" fill="#1A1A1A">Semaine du 16 juin</text>

    <!-- stats row -->
    <g>
      <rect x="118" y="146" width="43" height="36" rx="10" fill="#ffffff"/>
      <text x="139.5" y="166" font-size="14" font-weight="800" fill="#3D6B4F" text-anchor="middle">8</text>
      <text x="139.5" y="177" font-size="6" fill="#9b9488" text-anchor="middle">commandes</text>
      <rect x="165" y="146" width="43" height="36" rx="10" fill="#ffffff"/>
      <text x="186.5" y="166" font-size="14" font-weight="800" fill="#3D6B4F" text-anchor="middle">5</text>
      <text x="186.5" y="177" font-size="6" fill="#9b9488" text-anchor="middle">clientes</text>
      <rect x="212" y="146" width="43" height="36" rx="10" fill="#ffffff"/>
      <text x="233.5" y="166" font-size="14" font-weight="800" fill="#E8843D" text-anchor="middle">6</text>
      <text x="233.5" y="177" font-size="6" fill="#9b9488" text-anchor="middle">confirmées</text>
      <rect x="259" y="146" width="43" height="36" rx="10" fill="#ffffff"/>
      <text x="280.5" y="166" font-size="14" font-weight="800" fill="#3D6B4F" text-anchor="middle">32</text>
      <text x="280.5" y="177" font-size="6" fill="#9b9488" text-anchor="middle">portions</text>
    </g>

    <!-- commande 1 -->
    <rect x="118" y="192" width="184" height="78" rx="13" fill="#ffffff"/>
    <text x="130" y="210" font-size="11" font-weight="800" fill="#1A1A1A">Fard Karim</text>
    <rect x="244" y="200" width="50" height="14" rx="7" fill="#e6f0ea"/>
    <text x="269" y="210" font-size="7" font-weight="700" fill="#2f7d52" text-anchor="middle">Confirmée</text>
    <text x="130" y="226" font-size="7.5" fill="#8a8275">📅 jeu. 13h30 · 4 portions · 📦 140€</text>
    <rect x="130" y="234" width="62" height="15" rx="7.5" fill="#f4eee3"/>
    <text x="161" y="244.5" font-size="7" fill="#5b5345" text-anchor="middle">Crevettes ail</text>
    <rect x="196" y="234" width="56" height="15" rx="7.5" fill="#f4eee3"/>
    <text x="224" y="244.5" font-size="7" fill="#5b5345" text-anchor="middle">Quesadillas</text>
    <rect x="256" y="234" width="34" height="15" rx="7.5" fill="#f4eee3"/>
    <text x="273" y="244.5" font-size="7" fill="#8a8275" text-anchor="middle">+3</text>
    <rect x="130" y="255" width="160" height="7" rx="3.5" fill="#fbf7f0"/>

    <!-- commande 2 -->
    <rect x="118" y="278" width="184" height="78" rx="13" fill="#ffffff"/>
    <text x="130" y="296" font-size="11" font-weight="800" fill="#1A1A1A">Murielle C.</text>
    <rect x="236" y="286" width="58" height="14" rx="7" fill="#fff3d6"/>
    <text x="265" y="296" font-size="7" font-weight="700" fill="#9a7414" text-anchor="middle">En attente</text>
    <text x="130" y="312" font-size="7.5" fill="#8a8275">📅 jeu. 13h30 · 2 portions · 📦 110€</text>
    <rect x="130" y="320" width="40" height="15" rx="7.5" fill="#f4eee3"/>
    <text x="150" y="330.5" font-size="7" fill="#5b5345" text-anchor="middle">Rougail</text>
    <rect x="174" y="320" width="46" height="15" rx="7.5" fill="#f4eee3"/>
    <text x="197" y="330.5" font-size="7" fill="#5b5345" text-anchor="middle">Paëlla</text>
    <rect x="224" y="320" width="34" height="15" rx="7.5" fill="#f4eee3"/>
    <text x="241" y="330.5" font-size="7" fill="#8a8275" text-anchor="middle">+3</text>
    <rect x="130" y="341" width="160" height="7" rx="3.5" fill="#fbf7f0"/>

    <!-- commande 3 (partielle) -->
    <rect x="118" y="364" width="184" height="78" rx="13" fill="#ffffff"/>
    <text x="130" y="382" font-size="11" font-weight="800" fill="#1A1A1A">Sophie L.</text>
    <rect x="244" y="372" width="50" height="14" rx="7" fill="#e6f0ea"/>
    <text x="269" y="382" font-size="7" font-weight="700" fill="#2f7d52" text-anchor="middle">Confirmée</text>
    <text x="130" y="398" font-size="7.5" fill="#8a8275">📅 ven. 10h00 · 4 portions · 📦 90€</text>

    <!-- fade bas d'ecran -->
    <rect x="104" y="486" width="212" height="66" fill="#F5EFE3" opacity="0.85"/>
    <rect x="104" y="470" width="212" height="40" fill="url(#cream)" opacity="0.55"/>
  </g>

  <!-- dynamic island -->
  <rect x="185" y="33" width="50" height="13" rx="6.5" fill="#0a0a0a"/>

  <!-- carte flottante 1 : gain de temps -->
  <g filter="url(#cardShadow)"><rect x="22" y="150" width="116" height="60" rx="16" fill="#ffffff"/></g>
  <circle cx="46" cy="173" r="13" fill="#eaf3ee"/>
  <path d="M41 177l4-7 3 4 4-7" fill="none" stroke="#3D6B4F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="67" y="172" font-size="16" font-weight="800" fill="#1A1A1A">+5 h</text>
  <text x="67" y="185" font-size="8" fill="#7a8a80">gagnées par</text>
  <text x="67" y="195" font-size="8" fill="#7a8a80">semaine</text>

  <!-- carte flottante 2 : notification -->
  <g filter="url(#cardShadow)"><rect x="246" y="402" width="150" height="58" rx="16" fill="#ffffff"/></g>
  <circle cx="270" cy="431" r="13" fill="#fdecdd"/>
  <text x="270" y="436" font-size="12" text-anchor="middle">🔔</text>
  <text x="291" y="425" font-size="9" font-weight="800" fill="#1A1A1A">Nouvelle commande</text>
  <text x="291" y="438" font-size="8" fill="#8a8275">Karim · 5 plats</text>
  <text x="291" y="450" font-size="7.5" font-weight="700" fill="#E8843D">à l'instant</text>
</svg>
